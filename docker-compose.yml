version: "3.9"

volumes:
  postgres_data:
  minio_data:
  redis_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: avisos_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: avisos_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--no-auth-warning",
          "-a",
          "${REDIS_PASSWORD}",
          "PING",
        ]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: avisos_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avisos_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/code
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avisos_worker
    command: celery -A app.workers.celery_app worker --loglevel=info -Q notifications
    volumes:
      - ./backend:/code
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - api

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avisos_beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/code
    env_file:
      - .env
    depends_on:
      - redis
